name = "pickle-nick-worker"
main = "worker/index.ts"
compatibility_date = "2025-12-01"

[vars]
R2_PUBLIC_URL = "https://pickle-nick-worker.steve-700.workers.dev/api/r2/file"

[[d1_databases]]
binding = "DB"
database_name = "pickle-nick-db"
database_id = "3a5bfc65-f074-4de1-afba-9f80820d625b"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pickle-nick-assets"

[ai]
binding = "AI"

[[routes]]
pattern = "picklenick.au/api/*"
zone_name = "picklenick.au"

[triggers]
crons = ["0 * * * *"]

# Secrets — set via: wrangler secret put <NAME>
# CLERK_SECRET_KEY
# RESEND_API_KEY
# OPENROUTER_API_KEY
# ADMIN_EMAIL
# FB_PAGE_ID          (optional — Facebook integration)
# FB_PAGE_ACCESS_TOKEN (optional — Facebook integration)
