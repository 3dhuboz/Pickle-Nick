        right: 1.4rem;
        top: 0;
        height: 1px;
        background: linear-gradient(90deg, rgba(244, 197, 109, 0.42), rgba(188, 75, 53, 0.72), transparent);
      }

      .batch-feature {
        isolation: isolate;
      }

      .batch-feature::after {
        content: "";
        position: absolute;
        left: -1.4rem;
        top: 0;
        bottom: 0;
        width: 1px;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(244, 197, 109, 0.62), rgba(188, 75, 53, 0.16), transparent);
      }

      .batch-traits span {
        position: relative;
        padding-left: 0.95rem;
      }

      .batch-traits span::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 0.42rem;
        height: 1px;
        background: #bc4b35;
        box-shadow: 0 0 12px rgba(244, 197, 109, 0.55);
      }

      @media (max-width: 640px) {
        .pickle-button {
          min-height: 58px;
          min-width: 0;
          width: 100%;
          padding: 0 1.1rem;
          font-size: 0.78rem;
          letter-spacing: 0.14em;
        }

        .paper-proof-strip {
          min-height: 136px;
          clip-path: polygon(
            0 6%,
            8% 3%,
            18% 7%,
            31% 3%,
            44% 7%,
            58% 4%,
            73% 7%,
            89% 3%,
            100% 7%,
            100% 94%,
            88% 97%,
            74% 94%,
            59% 98%,
            43% 94%,
            28% 97%,
            13% 94%,
            0 97%
          );
        }

        .paper-proof-strip::before {
          top: -21px;
          height: 31px;
        }

        .paper-proof-strip::after {
          bottom: -18px;
          height: 29px;
        }

        .paper-brand-mark {
          display: block;
          width: 5.2rem;
          height: 5.2rem;
          opacity: 0.16;
        }

        .paper-brand-mark-left {
          left: -3.4rem;
          top: 50%;
        }

        .paper-brand-mark-right {
          right: -3.4rem;
          top: 50%;
        }

        .paper-proof {
          flex-direction: column;
          align-items: center;
          gap: 0.24rem;
          border-left: 0;
          padding: 0.15rem 0.1rem 0;
          text-align: center;
        }

        .paper-proof::before {
          display: none;
        }
      }

      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #120d0b;
      }
      ::-webkit-scrollbar-thumb {
        background: #bc4b35;
        border: 2px solid #120d0b;
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f4c56d;
      }
    </style>
